{% extends 'base.html' %}

{% block title %}Calendar - LectureBuzz{% endblock %}

{% block extra_css %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Schedule Calendar</h2>
        
        <div class="mb-3">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
            <a href="{% url 'schedule_list' %}" class="btn btn-info">List View</a>
        </div>

        <div id="calendar"></div>
    </div>
</div>

<!-- Day View Modal -->
<div class="modal fade" id="dayViewModal" tabindex="-1" aria-labelledby="dayViewModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="dayViewModalLabel">
                    <i class="bi bi-calendar-day"></i> Schedule for <span id="selectedDate"></span>
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="dayScheduleContent" class="container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var allEvents = [];
        var eventsLoaded = false;
        
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            events: function(info, successCallback, failureCallback) {
                fetch('{% url "schedule_calendar_data" %}')
                    .then(response => response.json())
                    .then(data => {
                        console.log('Events loaded:', data.length);
                        allEvents = data;
                        eventsLoaded = true;
                        successCallback(data);
                    })
                    .catch(error => {
                        console.error('Error loading events:', error);
                        failureCallback(error);
                    });
            },
            eventClick: function(info) {
                if (info.event.url) {
                    window.location.href = info.event.url;
                    info.jsEvent.preventDefault();
                }
            },
            dateClick: function(info) {
                // Single click - do nothing or show day view
            },
            // Double click on date cell
            dayCellDidMount: function(info) {
                info.el.addEventListener('dblclick', function() {
                    if (!eventsLoaded) {
                        console.warn('Events not loaded yet, please wait...');
                        return;
                    }
                    showDayView(info.date);
                });
            }
        });
        calendar.render();
        
        // Function to show day view in modal
        function showDayView(date) {
            // Format date as YYYY-MM-DD in local timezone (not UTC)
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;
            
            const formattedDate = new Date(date).toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            console.log('Double-clicked date:', dateStr);
            console.log('Total events loaded:', allEvents.length);
            
            // Set modal title
            document.getElementById('selectedDate').textContent = formattedDate;
            
            // Filter events for this date
            const dayEvents = allEvents.filter(event => {
                const eventDate = event.start.split('T')[0];
                console.log('Comparing:', eventDate, 'with', dateStr, '=', eventDate === dateStr);
                return eventDate === dateStr;
            });
            
            console.log('Events found for this date:', dayEvents.length);
            
            // Build content
            let content = '';
            
            if (dayEvents.length === 0) {
                content = `
                    <div class="alert alert-info text-center">
                        <h4><i class="bi bi-calendar-x"></i> No Classes Scheduled</h4>
                        <p>There are no classes scheduled for this date.</p>
                    </div>
                `;
            } else {
                // Sort events by time
                dayEvents.sort((a, b) => {
                    const timeA = a.start.split('T')[1];
                    const timeB = b.start.split('T')[1];
                    return timeA.localeCompare(timeB);
                });
                
                content = `
                    <div class="row">
                        <div class="col-md-12">
                            <h3 class="mb-4">
                                <span class="badge bg-primary">${dayEvents.length}</span> 
                                Class${dayEvents.length > 1 ? 'es' : ''} Scheduled
                            </h3>
                        </div>
                    </div>
                    <div class="row g-4">
                `;
                
                dayEvents.forEach((event, index) => {
                    const startTime = new Date(event.start).toLocaleTimeString('en-US', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    const endTime = new Date(event.end).toLocaleTimeString('en-US', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    
                    content += `
                        <div class="col-md-6">
                            <div class="card h-100 shadow-sm border-start border-primary border-4">
                                <div class="card-header bg-light">
                                    <h5 class="mb-0">
                                        <span class="badge bg-secondary me-2">${index + 1}</span>
                                        ${event.title}
                                    </h5>
                                </div>
                                <div class="card-body">
                                    <p class="mb-2">
                                        <i class="bi bi-clock text-primary"></i> 
                                        <strong>Time:</strong> ${startTime} - ${endTime}
                                    </p>
                                    <div class="mt-3">
                                        <a href="${event.url}" class="btn btn-primary btn-sm">
                                            <i class="bi bi-eye"></i> View Details
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                content += '</div>';
            }
            
            // Set content and show modal
            document.getElementById('dayScheduleContent').innerHTML = content;
            const modal = new bootstrap.Modal(document.getElementById('dayViewModal'));
            modal.show();
        }
    });
</script>
{% endblock %}
